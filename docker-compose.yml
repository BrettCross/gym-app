services:
  backend:
    build: ./backend
    deploy:
      resources:
        reservations:
          memory: 128M
        limits:
          cpus: '0.5'
          memory: 512M
    ports:
      - "8000:8000"
    env_file: 
      - .env
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    networks:
      - gym_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  audit_worker:
    build: ./backend
    command: python -u backend/worker.py
    env_file: .env
    environment:
      - PYTHONPATH=/app
    depends_on: [redis, mongodb]
    restart: unless-stopped
    networks:
      - gym_network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - gym_network

  mongodb:
    image: mongo:6.0
    environment:
      # Use variables from your .env file
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - gym_network

  redis:
    image: redis:7-alpine
    # Require a password for Redis
    command: redis-server --requirepass ${REDIS_PASS}
    networks:
      - gym_network

networks:
  gym_network:
    driver: bridge

volumes:
  mongo_data: